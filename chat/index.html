<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聊天室</title>
    <style>
        #displayArea img, #displayArea video {
            max-width: 100%;
            height: auto;
            margin-top: 10px;
        }
        #sendVideoButton, #sendImageButton {
            margin-left: 10px;
        }
    </style>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 从localStorage获取内容并显示
            var savedContent = localStorage.getItem('savedContent');
            if (savedContent) {
                document.getElementById('displayArea').innerHTML = savedContent;
            }

            // 绑定发送按钮的点击事件
            document.getElementById('sendButton').addEventListener('click', function() {
                var userInput = document.getElementById('inputBox').value;
                if (userInput.trim() !== '') {
                    var newParagraph = document.createElement('p');
                    newParagraph.textContent = userInput;
                    document.getElementById('displayArea').appendChild(newParagraph);
                    saveContent();
                    document.getElementById('inputBox').value = ''; // 清空输入框
                }
            });

            // 绑定发送视频按钮的点击事件
            document.getElementById('sendVideoButton').addEventListener('click', function() {
                var videoInput = document.getElementById('videoInput');
                if (videoInput.files.length > 0) {
                    var videoUrl = URL.createObjectURL(videoInput.files[0]);
                    var newVideo = document.createElement('video');
                    newVideo.src = videoUrl;
                    newVideo.controls = true;
                    document.getElementById('displayArea').appendChild(newVideo);
                    saveContent();
                    videoInput.value = ''; // 清空视频输入
                }
            });

            // 绑定发送图片按钮的点击事件
            document.getElementById('sendImageButton').addEventListener('click', function() {
                var imageInput = document.getElementById('imageInput');
                if (imageInput.files.length > 0) {
                    var imageUrl = URL.createObjectURL(imageInput.files[0]);
                    var newImage = document.createElement('img');
                    newImage.src = imageUrl;
                    document.getElementById('displayArea').appendChild(newImage);
                    saveContent();
                    imageInput.value = ''; // 清空图片输入
                }
            });

            // 保存内容到localStorage的函数
            function saveContent() {
                var currentContent = document.getElementById('displayArea').innerHTML;
                localStorage.setItem('savedContent', currentContent);
            }

            // 清除聊天内容的函数
            function clearChat() {
                document.getElementById('displayArea').innerHTML = '';
                localStorage.removeItem('savedContent');
            }

            // 检查URL参数
            var urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('clearChat') && urlParams.get('clearChat') === 'true') {
                clearChat();
            }

            // 创建一个隐藏的按钮
            var clearButton = document.createElement('button');
            clearButton.textContent = 'Clear Chat';
            clearButton.style.display = 'none'; // 默认不显示
            clearButton.addEventListener('click', clearChat);
            document.body.appendChild(clearButton);

            // 通过长按输入框来显示清除按钮
            var inputBox = document.getElementById('inputBox');
            inputBox.addEventListener('contextmenu', function(e) {
                e.preventDefault(); // 阻止默认长按菜单
                clearButton.style.display = 'block'; // 显示按钮
                clearButton.style.position = 'fixed';
                clearButton.style.bottom = '10px';
                clearButton.style.right = '10px';
            });

            // 点击非按钮区域时隐藏按钮
            document.addEventListener('click', function(e) {
                if (e.target !== clearButton) {
                    clearButton.style.display = 'none';
                }
            });
        });
    </script>
</head>
<body>

    <input type="text" id="inputBox" placeholder="输入要发送的消息:">
    <button id="sendButton">发送</button>
    <input type="file" id="videoInput" accept="video/*" style="margin-top: 10px;">
    <button id="sendVideoButton">发送视频</button>
    <input type="file" id="imageInput" accept="image/*" style="margin-top: 10px;">
    <button id="sendImageButton">发送图片</button>
    <div id="displayArea"></div>

</body>
</html>
