<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录页面</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #292929;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            width: 300px;
            text-align: center;
        }

        .login-container h2 {
            margin-bottom: 20px;
            color: #333333;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #555555;
        }

        .input-group input {
            width: 100%;
            padding: 8px;
            border: 1px solid #cccccc;
            border-radius: 4px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>登录</h2>
        <form id="loginForm">
            <div class="input-group">
                <label for="username">用户名:</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="input-group">
                <label for="password">密码:</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit">登录</button>
        </form>
        <p id="message"></p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault(); // 阻止表单提交

            var username = document.getElementById('username').value;
            var password = document.getElementById('password').value;
            if (username === 'ADMINISTROR' && password === 'Administror--ChenWu') {
                localStorage.setItem('loggedIn', 'true');
                localStorage.setItem('username', username);
                document.getElementById('message').innerText = '登录成功！';
                // 在实际应用中，这里可能会重定向到另一个页面
            } else if (username === 'Duan' && password === 'Mini486486'){
                localStorage.setItem('loggedIn', 'true');
                localStorage.setItem('username', username);
                document.getElementById('message').innerText = '登录成功！';
                // 在实际应用中，这里可能会重定向到另一个页面
            } else {
                document.getElementById('message').innerText = '用户名或密码错误，请重试。';
            }
        });

        // 页面加载时检查登录状态
        window.onload = function() {
            if (localStorage.getItem('loggedIn') === 'true') {
                document.getElementById('message').innerText = '欢迎回来，' + localStorage.getItem('username') + '！';
                // 在实际应用中，这里可能会直接重定向到用户的主页
            }
        };
    </script>
</body>
                                      </html>
